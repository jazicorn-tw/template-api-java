name: Release

# Handles the full delivery pipeline:
#   docker-build  — build check on PRs and branch pushes (no push)
#   helm-lint     — Helm chart validation on PRs and branch pushes
#   release       — semantic-release on main/canary (gated)
#   publish       — Docker + Helm publish on tag push or after release

on:
  pull_request:
    branches: [ main, staging, canary ]
  push:
    branches: [ main, staging, canary ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      enable_release:
        description: "Run semantic-release for this run (overrides repo variable gate)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# No workflow-level permissions — declared per job to grant least privilege.

concurrency:
  group: release-${{ github.ref }}
  # Cancel in-progress runs on PRs and feature branches; never cancel on
  # main, canary, or tag pushes where releases / publishes must complete.
  cancel-in-progress: >-
    ${{
      github.ref != 'refs/heads/main' &&
      github.ref != 'refs/heads/canary' &&
      !startsWith(github.ref, 'refs/tags/')
    }}

jobs:
  # ── Docker build check (CI only, no push) ────────────────────────────────────
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest

    # Skip on tag pushes — build was already validated on the branch push.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    permissions:
      contents: read

    env:
      ACT: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (CI only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
          tags: ${{ github.repository }}:ci
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Helm lint ─────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint (CI only)
    runs-on: ubuntu-latest

    # Skip on tag pushes.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    permissions:
      contents: read

    env:
      ACT: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # GitHub-hosted runners: use toolcache via setup-helm
      - name: Set up Helm (GitHub runners)
        if: ${{ !env.ACT }}
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      # act local runs: install Helm without hostedtoolcache or apt repos
      - name: Install Helm (act)
        if: ${{ env.ACT }}
        run: |
          set -euo pipefail
          HELM_VERSION="v3.14.4"
          curl -fsSLo /tmp/helm.tgz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/helm.tgz -C /tmp
          install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version

      - name: Helm lint
        run: helm lint helm/app

  # ── Semantic release ──────────────────────────────────────────────────────────
  release:
    needs: [docker-build, helm-lint]
    # Run only on push to main/canary or manual dispatch — not PRs or tag pushes.
    # always() lets this job evaluate even when docker-build/helm-lint are skipped
    # (tag pushes skip those jobs). The needs-result checks guard against failures.
    # Gate releases behind ENABLE_SEMANTIC_RELEASE=true (repo variable) or
    # enable_release=true (manual input).
    if: >-
      always() &&
      (needs.docker-build.result == 'success' || needs.docker-build.result == 'skipped') &&
      (needs.helm-lint.result == 'success' || needs.helm-lint.result == 'skipped') &&
      (inputs.enable_release == 'true' || vars.ENABLE_SEMANTIC_RELEASE == 'true') &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/canary')))
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    outputs:
      published_version: ${{ steps.semrel-publish.outputs.published_version }}
      preview_next_version: ${{ steps.semrel-preview.outputs.next_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Disable git hooks for release automation
        run: |
          set -euo pipefail
          mkdir -p /tmp/empty-git-hooks
          git config core.hooksPath /tmp/empty-git-hooks

      # ------------------------------------------------------------
      # Runner temp dirs (act only)
      # ------------------------------------------------------------

      - name: Ensure runner temp dirs (act only)
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/runner-temp /tmp/runner-tool-cache
          echo "RUNNER_TEMP=/tmp/runner-temp" >> "$GITHUB_ENV"
          echo "RUNNER_TOOL_CACHE=/tmp/runner-tool-cache" >> "$GITHUB_ENV"

      # ------------------------------------------------------------
      # Gradle cache isolation (important for act stability)
      # ------------------------------------------------------------

      - name: Set Gradle user home
        run: |
          set -euo pipefail
          # Prefer RUNNER_TEMP when available; fall back to /tmp for portability.
          echo "GRADLE_USER_HOME=${RUNNER_TEMP:-/tmp}/gradle-home" >> "$GITHUB_ENV"

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.GH_APP_ID }}
          private_key: ${{ fromJSON(format('"{0}"', secrets.GH_APP_PRIVATE_KEY)) }}

      - name: Force HTTPS git remote (avoid SSH in act)
        run: |
          set -euo pipefail

          # Ensure the token never shows up in logs
          echo "::add-mask::${GH_TOKEN}"

          # Make origin use HTTPS (semantic-release calls git under the hood)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Also rewrite any ssh-style GitHub URLs that tools might use
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Release gate summary
        run: |
          set -euo pipefail
          echo "::group::🚦 Release gate evaluation"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚦 Release gate evaluation"
          echo ""
          echo "Event:              ${{ github.event_name }}"
          echo "Branch:             ${{ github.ref_name }}"
          echo "Manual input:       ${{ inputs.enable_release || 'n/a' }}"
          echo "Repo gate var:      ${{ vars.ENABLE_SEMANTIC_RELEASE || 'unset' }}"
          echo "Docker publish var: ${{ vars.PUBLISH_DOCKER_IMAGE || 'unset' }}"
          echo "Helm publish var:   ${{ vars.PUBLISH_HELM_CHART || 'unset' }}"
          echo "Canonical repo:     ${{ vars.CANONICAL_REPOSITORY || 'unset' }}"
          echo "This repo:          ${{ github.repository }}"
          echo ""
          echo "Gate result: ALLOWED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "::endgroup::"

      - name: Set up Java 21 + Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          setup-gradle: 'true'

      - name: Gradle (act only — lightweight)
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          set -euo pipefail
          echo "::group::🐘 Gradle (act)"
          echo "GRADLE_USER_HOME=${GRADLE_USER_HOME}"
          ./gradlew --version
          echo "::endgroup::"

      - name: Set up Node (CI only)
        if: ${{ github.actor != 'nektos/act' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Node (act only — use preinstalled)
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          set -euo pipefail
          echo "::group::🟩 Node (act)"
          node --version
          npm --version
          echo "::endgroup::"

      - name: Install semantic-release deps
        run: npm ci

      - name: Preview next release version (dry-run)
        id: semrel-preview
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          echo "::group::🔎 semantic-release dry-run (preview)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔎 semantic-release dry-run (preview)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          npx semantic-release --dry-run --no-ci | tee semantic-release-dryrun.log

          # Best-effort extraction of the computed next version (format varies by plugins).
          next_version="$(
            grep -Eo 'next release version is [0-9]+\.[0-9]+\.[0-9]+' semantic-release-dryrun.log \
              | tail -n 1 \
              | awk '{print $NF}' \
              || true
          )"

          if [ -n "$next_version" ]; then
            echo ""
            echo "✅ Next version (if published): $next_version"
            echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "ℹ️ No next version detected (likely: no releasable commits)."
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "::endgroup::"

      - name: Run semantic-release (act dry-run only)
        if: ${{ github.actor == 'nektos/act' }}
        id: semrel
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          echo "::group::🚫 semantic-release (act) — dry-run only (no publish)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚫 semantic-release (act) — dry-run only (no publish)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Never publish from local act runs.
          npx semantic-release --dry-run --no-ci | tee semantic-release.log
          echo "::endgroup::"

          # Intentionally do NOT set published_version in act mode.

      - name: Run semantic-release (publish)
        if: ${{ github.actor != 'nektos/act' }}
        id: semrel-publish
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          echo "::group::🚀 semantic-release publish"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 semantic-release publish"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          npx semantic-release | tee semantic-release.log
          echo "::endgroup::"

          # Best-effort extraction of the published version.
          published_version="$(
            grep -Eo 'Published release [0-9]+\.[0-9]+\.[0-9]+' semantic-release.log \
              | tail -n 1 \
              | awk '{print $NF}' \
              || true
          )"

          if [ -n "$published_version" ]; then
            echo "published_version=$published_version" >> "$GITHUB_OUTPUT"
          fi

      - name: Post-release summary (what happened)
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Release outcome"
          echo ""

          if [ "${{ steps.semrel-publish.outputs.published_version }}" != "" ]; then
            echo "✅ Published: ${{ steps.semrel-publish.outputs.published_version }}"
          elif [ "${{ steps.semrel-preview.outputs.next_version }}" != "" ]; then
            echo "ℹ️ No publish detected. Preview suggested: ${{ steps.semrel-preview.outputs.next_version }}"
            echo "   (Common cause: semantic-release found no releasable commits or publish step exited early.)"
          else
            echo "ℹ️ No release published (likely: no releasable commits)."
          fi

          echo ""
          echo "Where to look:"
          echo "  - semantic-release.log        (publish run)"
          echo "  - semantic-release-dryrun.log (preview run)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Write release summary (job summary)
        if: always()
        run: |
          {
            echo "# 🚀 Release Summary"
            echo ""
            echo "## Trigger"
            echo "- Event: **${{ github.event_name }}**"
            echo "- Branch: **${{ github.ref_name }}**"
            echo ""
            echo "## Gates"
            echo "- ENABLE_SEMANTIC_RELEASE: **${{ vars.ENABLE_SEMANTIC_RELEASE || 'unset' }}**"
            echo "- Manual enable_release: **${{ inputs.enable_release || 'n/a' }}**"
            echo "- PUBLISH_DOCKER_IMAGE: **${{ vars.PUBLISH_DOCKER_IMAGE || 'unset' }}**"
            echo "- PUBLISH_HELM_CHART: **${{ vars.PUBLISH_HELM_CHART || 'unset' }}**"
            echo ""
            if [ "${{ steps.semrel-publish.outputs.published_version }}" != "" ]; then
              echo "## Outcome"
              echo "✅ Published version **${{ steps.semrel-publish.outputs.published_version }}**"
            elif [ "${{ steps.semrel-preview.outputs.next_version }}" != "" ]; then
              echo "## Outcome"
              echo "ℹ️ No release published"
              echo ""
              echo "Preview suggested version: **${{ steps.semrel-preview.outputs.next_version }}**"
            else
              echo "## Outcome"
              echo "ℹ️ No releasable commits detected"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Publish Docker + Helm (on tag push) ──────────────────────────────────────
  publish:
    name: Publish Docker + Helm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    # Run only on tag pushes (vX.Y.Z). Semantic-release always pushes the tag
    # it creates, which triggers this job in its own workflow run with the
    # correct ref. No needs: dependency — the release job is skipped on tag
    # pushes, and depending on it caused GitHub Actions to skip this job too.
    # Canonical repository check prevents fork-triggered publishes.
    if: >-
      github.repository == vars.CANONICAL_REPOSITORY &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Artifact publishing"
          echo ""
          echo "repo=${{ github.repository }}"
          echo "ref=${{ github.ref_name }}"
          echo "docker_flag=${{ vars.PUBLISH_DOCKER_IMAGE || 'unset' }}"
          echo "helm_flag=${{ vars.PUBLISH_HELM_CHART || 'unset' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Set up Docker Buildx
        if: ${{ vars.PUBLISH_DOCKER_IMAGE == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ vars.PUBLISH_DOCKER_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Stable  v1.2.3          → 1.2.3, 1.2, 1, latest
      # Canary  v1.2.3-canary.1 → 1.2.3-canary.1, canary
      - name: Extract Docker metadata (tags/labels)
        id: meta
        if: ${{ vars.PUBLISH_DOCKER_IMAGE == 'true' }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref, '-') }}
            type=raw,value=canary,enable=${{ contains(github.ref, '-canary') }}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        if: ${{ vars.PUBLISH_DOCKER_IMAGE == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm (chart publish)
        if: ${{ vars.PUBLISH_HELM_CHART == 'true' }}
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR (Helm)
        if: ${{ vars.PUBLISH_HELM_CHART == 'true' }}
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | helm registry login ghcr.io \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Publish Helm chart
        if: ${{ vars.PUBLISH_HELM_CHART == 'true' }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "ref_name : ${{ github.ref_name }}"
          echo "VERSION  : $VERSION"
          CHART_NAME="$(helm show chart helm/app | grep '^name:' | awk '{print $2}')"
          echo "CHART_NAME: $CHART_NAME"
          helm package helm/app \
            --version "$VERSION" \
            --app-version "$VERSION"
          echo "Package created: ${CHART_NAME}-${VERSION}.tgz"
          helm push "${CHART_NAME}-${VERSION}.tgz" \
            oci://ghcr.io/${{ github.repository_owner }}/charts
          echo "Push complete"

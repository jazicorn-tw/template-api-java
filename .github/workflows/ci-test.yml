name: CI Test

on:
  pull_request:
  push:
    branches: [ main, staging, dev ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Gradle tests (Java 21 + Testcontainers)
    runs-on: ubuntu-latest

    env:
      # Keep CI stable/consistent
      CI: true

      # Ensure test profile is consistently used in CI
      SPRING_PROFILES_ACTIVE: test

      # Optional: speed up Gradle; safer on low-mem runners
      # (org.gradle.caching is set in gradle.properties)
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false

      # Optional: some environments benefit from reuse, but it's not required
      TESTCONTAINERS_REUSE_ENABLE: false

      # Optional: override BaseIntegrationTest defaults (uncomment if needed)
      # TEST_DATASOURCE_IMAGE: postgres:16-alpine
      # TEST_DATASOURCE_DB: {{app-name}}_test
      # TEST_DATASOURCE_USER: test
      # TEST_DATASOURCE_PASSWORD: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: ./.github/actions/setup-java-gradle
        with:
          gradle-cache: 'true'

      - name: Docker sanity check (for Testcontainers)
        run: |
          docker version
          docker info

      - name: Run tests
        shell: bash
        run: |
          if [[ "${ACT:-}" == "true" ]]; then
            echo "Running under act — disabling Ryuk"
            export TESTCONTAINERS_RYUK_DISABLED=true
          fi

          ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports (on failure)
        if: ${{ failure() && github.actor != 'nektos/act' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test

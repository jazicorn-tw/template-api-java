name: CI

on:
  pull_request:
  push:
    branches: [ main, staging ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # required for SonarCloud PR decoration

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test (compile + Testcontainers + SonarCloud) ─────────────────────────────
  test:
    name: Build + test (Java 21 + Testcontainers)
    runs-on: ubuntu-latest

    needs:
      - quality

    env:
      CI: true
      SPRING_PROFILES_ACTIVE: test

      # Keep Gradle user home inside the workspace so `act` doesn't end up with
      # caches in /tmp that can be mutated / cleaned unexpectedly.
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.parallel=true
        -Dorg.gradle.caching=true
        -Dorg.gradle.vfs.watch=false

      TESTCONTAINERS_REUSE_ENABLE: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Act: use persisted Gradle user home"
        shell: bash
        run: |
          if [[ "${ACT:-}" == "true" ]]; then
            echo "ACT=true → using persisted Gradle cache dir: .gradle-act"
            echo "GRADLE_USER_HOME=${GITHUB_WORKSPACE}/.gradle-act" >> "$GITHUB_ENV"
            mkdir -p "${GITHUB_WORKSPACE}/.gradle-act"
          fi

      - name: "Act: reset Gradle immutable caches (prevents immutable workspace errors)"
        if: ${{ github.actor == 'nektos/act' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "ACT=true → removing Gradle immutable caches that commonly break under bind mounts"
          rm -rf "${GRADLE_USER_HOME}/caches/9.2.1/groovy-dsl" || true
          rm -rf "${GRADLE_USER_HOME}/caches/9.2.1/transforms" || true
          rm -rf "${GRADLE_USER_HOME}/caches/journal-1" || true
          rm -rf "${GRADLE_USER_HOME}/caches/build-cache-1" || true

      - name: "Act: configure Testcontainers"
        shell: bash
        run: |
          if [[ "${ACT:-}" == "true" ]]; then
            echo "ACT=true → applying local Testcontainers compatibility settings"
            {
              echo "DOCKER_HOST=unix:///var/run/docker.sock"
              echo "TESTCONTAINERS_RYUK_DISABLED=true"
              echo "TESTCONTAINERS_CHECKS_DISABLE=true"
            } >> "$GITHUB_ENV"
          fi

      - name: "Act: set HOME (required for setup-java)"
        if: ${{ github.actor == 'nektos/act' }}
        shell: bash
        run: |
          echo "HOME=${GITHUB_WORKSPACE}/.home" >> "$GITHUB_ENV"
          echo "MAVEN_CONFIG=${GITHUB_WORKSPACE}/.home/.m2" >> "$GITHUB_ENV"
          mkdir -p "${GITHUB_WORKSPACE}/.home/.m2"

      - name: Set up Java 21 + Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          setup-gradle: 'true'

      - name: Docker sanity check (for Testcontainers)
        run: |
          docker version
          docker info

      - name: Compile
        run: ./gradlew classes --no-daemon --stacktrace

      - name: Run tests
        shell: bash
        run: |
          if [[ "${ACT:-}" == "true" ]]; then
            echo "Running under act — disabling Ryuk"
            export TESTCONTAINERS_RYUK_DISABLED=true
          fi
          ./gradlew test --no-daemon --stacktrace

      - name: Cache SonarCloud packages
        if: ${{ vars.ENABLE_SONAR != 'false' && github.actor != 'nektos/act' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud analysis
        if: ${{ vars.ENABLE_SONAR != 'false' && github.actor != 'nektos/act' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN:-}" ]; then
            echo "::warning::SONAR_TOKEN not set — skipping Sonar analysis"
            exit 0
          fi
          echo "::group::🔍 Sonar analysis"
          ./gradlew jacocoTestReport sonar --no-daemon --no-configuration-cache --info
          echo "::endgroup::"

      - name: Upload test reports (on failure)
        if: ${{ failure() && github.actor != 'nektos/act' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test

  # ── Quality (Spotless + static analysis) ─────────────────────────────────────
  quality:
    name: Spotless + static analysis (no Docker)
    runs-on: ubuntu-latest

    env:
      CI: true
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: ./.github/actions/setup-java-gradle
        with:
          gradle-cache: 'true'

      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Static analysis (Checkstyle/PMD/SpotBugs)
        if: ${{ vars.ENABLE_STATIC_ANALYSIS != 'false' }}
        run: ./gradlew checkstyleMain checkstyleTest pmdMain pmdTest spotbugsMain spotbugsTest --no-daemon --stacktrace

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_MD_LINT != 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown files
        run: ./node_modules/.bin/markdownlint-cli2 '**/*.md' '#node_modules'

  # ── Planning lint ─────────────────────────────────────────────────────────────
  planning-lint:
    name: Lint planning files (IDEAS/TODO)
    runs-on: ubuntu-latest

    needs:
      - markdown-lint
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load planning config
        id: planning-config
        shell: bash
        run: |
          python3 <<'PY'
          import json, os

          cfg = ".config/local-settings.json"

          with open(cfg, "r", encoding="utf-8") as f:
              data = json.load(f)

          planning = data.get("planning", {})
          base = planning.get("dir", "docs/planning")

          env = {
              "IDEAS_FILE": f"{base}/{planning.get('ideas', 'IDEAS.md')}",
              "TODO_FILE": f"{base}/{planning.get('todo', 'TODO.md')}",
              "CHECKLIST_FILE": f"{base}/{planning.get('checklist', 'PROMOTION_CHECKLIST.md')}",
          }

          with open(os.environ["GITHUB_ENV"], "a") as fh:
              for k, v in env.items():
                  fh.write(f"{k}={v}\n")
          PY

      - name: Run planning lint
        shell: bash
        run: |
          bash scripts/planning/planning-lint.sh

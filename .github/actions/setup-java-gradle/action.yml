name: Setup Java 21 + Gradle
description: >
  Installs Java 21 (Temurin). Optionally enables setup-java's built-in Gradle
  dependency cache, or runs gradle/actions/setup-gradle for wrapper validation
  and caching (CI-only; automatically skipped and suppressed under act).

inputs:
  gradle-cache:
    description: >
      Enable setup-java's built-in Gradle dependency cache (cache: gradle).
      Automatically disabled under act to avoid cleanup-time path warnings.
      Do not combine with setup-gradle: true.
    required: false
    default: 'false'

  setup-gradle:
    description: >
      Run gradle/actions/setup-gradle for wrapper validation + caching.
      Skipped automatically under act; job summary output is also suppressed
      under act when this is enabled.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
        cache: ${{ (inputs.gradle-cache == 'true' && github.actor != 'nektos/act') && 'gradle' || '' }}

    - name: Suppress job summary under act
      if: ${{ inputs.setup-gradle == 'true' && github.actor == 'nektos/act' }}
      shell: bash
      run: echo "GITHUB_STEP_SUMMARY=/dev/null" >> "$GITHUB_ENV"

    - name: Set up Gradle (CI only — wrapper validation + caching)
      if: ${{ inputs.setup-gradle == 'true' && github.actor != 'nektos/act' }}
      uses: gradle/actions/setup-gradle@v4
